<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务状态监控</title>
    <style>
        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --text-primary: #eaeaea;
            --text-secondary: #a0a0a0;
            --accent: #6366f1;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 40px 20px;
            background-image: 
                radial-gradient(ellipse at top, #1a1a3e 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, #1e1e4a 0%, transparent 50%);
        }
        .container { max-width: 900px; margin: 0 auto; }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: var(--bg-card);
            border-radius: 50px;
            font-size: 0.9rem;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        .status-dot.online { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .status-dot.offline { background: var(--error); box-shadow: 0 0 10px var(--error); }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .stat-value.success { color: var(--success); }
        .stat-value.error { color: var(--error); }
        .stat-label { color: var(--text-secondary); font-size: 0.9rem; }

        .monitor-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .monitor-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s, border-color 0.2s;
        }
        .monitor-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }
        .monitor-info { display: flex; align-items: center; gap: 16px; }
        .monitor-icon {
            width: 44px;
            height: 44px;
            background: rgba(99, 102, 241, 0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .monitor-name {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 4px;
        }
        .monitor-url {
            font-size: 0.8rem;
            color: var(--text-secondary);
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .monitor-status {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .status-tag {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .status-tag.up { background: rgba(34, 197, 94, 0.15); color: var(--success); }
        .status-tag.down { background: rgba(239, 68, 68, 0.15); color: var(--error); }
        
        .response-time {
            font-size: 0.85rem;
            color: var(--text-secondary);
            min-width: 80px;
            text-align: right;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .footer a { color: var(--accent); text-decoration: none; }

        @media (max-width: 600px) {
            .stats { grid-template-columns: 1fr; }
            .monitor-card { flex-direction: column; align-items: flex-start; gap: 16px; }
            .monitor-status { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🟢 服务状态</h1>
            <div class="status-badge">
                <span class="status-dot" id="globalDot"></span>
                <span id="globalStatus">检查中...</span>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value success" id="upCount">-</div>
                <div class="stat-label">在线</div>
            </div>
            <div class="stat-card">
                <div class="stat-value error" id="downCount">-</div>
                <div class="stat-label">离线</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="uptimePercent">-</div>
                <div class="stat-label">可用率</div>
            </div>
        </div>

        <div class="monitor-list" id="monitorList"></div>

        <div class="footer">
            最后更新: <span id="lastUpdate">-</span><br>
            由 <a href="#">HF Spaces Keep Alive</a> 驱动
        </div>
    </div>

    <script>
        const icons = {
            'jyujiaf-ai': '🤖',
            'default': '🚀'
        };
        
        function getIcon(url) {
            for (const key in icons) {
                if (url.includes(key)) return icons[key];
            }
            return icons['default'];
        }

        fetch('status.json')
            .then(r => r.json())
            .then(data => {
                const results = data.results || [];
                const upCount = results.filter(r => r.status === 200).length;
                const downCount = results.length - upCount;
                const uptime = results.length ? Math.round((upCount / results.length) * 100) : 0;

                document.getElementById('upCount').textContent = upCount;
                document.getElementById('downCount').textContent = downCount;
                document.getElementById('uptimePercent').textContent = uptime + '%';
                document.getElementById('lastUpdate').textContent = data.time || '-';

                const globalDot = document.getElementById('globalDot');
                const globalStatus = document.getElementById('globalStatus');
                if (upCount === results.length && results.length > 0) {
                    globalDot.className = 'status-dot online';
                    globalStatus.textContent = '所有服务正常运行';
                } else if (upCount > 0) {
                    globalDot.className = 'status-dot offline';
                    globalStatus.textContent = `${downCount} 个服务异常`;
                } else {
                    globalDot.className = 'status-dot offline';
                    globalStatus.textContent = '无法获取状态';
                }

                const list = document.getElementById('monitorList');
                results.forEach(item => {
                    const isUp = item.status === 200;
                    const name = item.url.replace('https://', '').replace('http://', '').split('/')[0];
                    
                    const card = document.createElement('div');
                    card.className = 'monitor-card';
                    card.innerHTML = `
                        <div class="monitor-info">
                            <div class="monitor-icon">${getIcon(item.url)}</div>
                            <div>
                                <div class="monitor-name">${name}</div>
                                <div class="monitor-url">${item.url}</div>
                            </div>
                        </div>
                        <div class="monitor-status">
                            <span class="status-tag ${isUp ? 'up' : 'down'}">${isUp ? '在线' : '离线'}</span>
                            <span class="response-time">${isUp ? 'OK' : item.status || '错误'}</span>
                        </div>
                    `;
                    list.appendChild(card);
                });
            })
            .catch(() => {
                document.getElementById('monitorList').innerHTML = '<p style="text-align:center;color:var(--text-secondary)">暂无监控数据，请先运行工作流</p>';
            });
    </script>
</body>
</html>
