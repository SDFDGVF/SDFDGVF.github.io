<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HF Spaces 状态监控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; color: #ff6b6b; }
        .status-card {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .space-url { font-size: 16px; color: #4ecdc4; }
        .space-status { 
            padding: 8px 16px; 
            border-radius: 20px; 
            font-weight: bold;
        }
        .online { background: #2ecc71; color: #fff; }
        .offline { background: #e74c3c; color: #fff; }
        .last-updated { text-align: center; color: #888; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>HF Spaces 状态监控</h1>
        <div id="status"></div>
        <p class="last-updated">最后更新: <span id="time">-</span></p>
    </div>
    <script>
        fetch('status.json')
            .then(r => r.json())
            .then(data => {
                const container = document.getElementById('status');
                document.getElementById('time').textContent = data.time;
                data.results.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'status-card';
                    card.innerHTML = `
                        <span class="space-url">${item.url}</span>
                        <span class="space-status ${item.status === 200 ? 'online' : 'offline'}">${item.status === 200 ? '在线' : '离线 (' + item.status + ')'}</span>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(() => {
                document.getElementById('status').innerHTML = '<p style="text-align:center">暂无状态数据</p>';
            });
    </script>
</body>
</html>
